<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HormigasAIS | Monitor de Colonia Soberana</title>
    <style>
        body { background: #0a0a0c; color: #e0e0e0; font-family: 'Courier New', monospace; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .card { border: 1px solid #333; padding: 15px; background: #121214; border-radius: 4px; }
        .val { font-size: 24px; color: #00ff00; font-weight: bold; }
        .sandbox-card { border-left: 4px solid #ffff00; }
        h2 { color: #888; font-size: 14px; text-transform: uppercase; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #222; padding: 8px; text-align: left; }
        th { background: #1a1a1c; }
    </style>
</head>
<body>
    <h1>🐜 HormigasAIS | Monitor de Colonia</h1>
    
    <div class="grid">
        <div class="card">
            <h2>Total Feromonas</h2>
            <div id="total" class="val">0</div>
        </div>
        <div class="card">
            <h2>Nodos Activos</h2>
            <div id="nodos" class="val">0</div>
        </div>
        <div class="card sandbox-card">
            <h2>Evolución Sandbox</h2>
            <div>Evento: <span id="sandbox_event">--</span></div>
            <div>Salud: <span id="sandbox_health">--</span></div>
            <div>Recuperación: <span id="sandbox_time">--</span></div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID Nodo</th>
                <th>IP / Origen</th>
                <th>Estado</th>
                <th>Protocolo</th>
            </tr>
        </thead>
        <tbody id="lista_nodos">
            </tbody>
    </table>

    <script src="update_dashboard.js"></script>
</body>
</html>
